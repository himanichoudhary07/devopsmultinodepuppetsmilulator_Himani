name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Python setup
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ✅ Install dependencies
      - name: Install Dependencies
        run: pip install flask pytest

      # ✅ Run tests
      - name: Run Tests
        run: pytest tests/

      # ✅ Build Docker (FIXED PATH)
      - name: Build Docker Image
        run: docker build -t puppet-simulator ./infrastructure/docker

      # ✅ Success
      - name: Success Message
        run: echo "Pipeline executed successfully"